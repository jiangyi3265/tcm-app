name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      WEB_ROOT: /www/wwwroot/www.otcm.app
      VITE_PUBLIC_APP_BASE_URL: https://www.otcm.app
      VITE_APP_VERSION: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY secret."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload dist
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          tar -C dist -czf /tmp/otcm-frontend-dist.tar.gz .
          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$WEB_ROOT'"
          scp -P "$PORT" /tmp/otcm-frontend-dist.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/otcm-frontend-dist.tar.gz"
          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf /tmp/otcm-frontend-dist.tar.gz -C '$WEB_ROOT' && nginx -t && (systemctl reload nginx || service nginx reload || /etc/init.d/nginx reload || /www/server/nginx/sbin/nginx -s reload)"
